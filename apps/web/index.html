<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- ピンチズーム/ダブルタップ拡大を無効化し、ネイティブアプリのような固定表示にする -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>tete</title>

    <!-- ── PWA ───────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#fcfbfa" />
    <meta name="application-name" content="tete" />

    <!-- iOS: ホーム画面追加時にブラウザのUI（上下バー）を消してスタンドアロン表示にする -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="tete" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
